services:
  db:
    image: postgres:16-alpine
    container_name: ${APP_SLUG}_db_${APP_ENV}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pb_appnet

  backend:
    build:
      context: ./backend
    container_name: ${APP_SLUG}_backend_${APP_ENV}
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change_me}
      DJANGO_ALLOWED_HOSTS: ${APP_HOST},backend
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    networks:
      - pb_appnet
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.pb-api-web.entrypoints=web"
      - "traefik.http.routers.pb-api-web.rule=Host(`pb.mon-site.ca`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.pb-api-web.middlewares=pb-api-redirect-https"
      - "traefik.http.middlewares.pb-api-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.routers.pb-api-websecure.entrypoints=websecure"
      - "traefik.http.routers.pb-api-websecure.rule=Host(`pb.mon-site.ca`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.pb-api-websecure.tls=true"
      - "traefik.http.routers.pb-api-websecure.tls.certresolver=le"
      - "traefik.http.services.pb-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
    container_name: ${APP_SLUG}_frontend_${APP_ENV}
    depends_on:
      - backend
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    networks:
      - pb_appnet
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.pb-web.entrypoints=web"
      - "traefik.http.routers.pb-web.rule=Host(`pb.mon-site.ca`)"
      - "traefik.http.routers.pb-web.middlewares=pb-redirect-https"
      - "traefik.http.middlewares.pb-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.routers.pb-websecure.entrypoints=websecure"
      - "traefik.http.routers.pb-websecure.rule=Host(`pb.mon-site.ca`)"
      - "traefik.http.routers.pb-websecure.tls=true"
      - "traefik.http.routers.pb-websecure.tls.certresolver=le"
      - "traefik.http.services.pb-frontend.loadbalancer.server.port=80"

volumes:
  db_data:
    name: ${APP_SLUG}_db_data

networks:
  pb_appnet:
    name: ${APP_SLUG}_appnet
    driver: bridge
  edge:
    external: true
